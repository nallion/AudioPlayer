version: 1.0.{build}

# --- Репозиторий ---
# Если проект в AppVeyor подключён через GitHub-интеграцию
# (Projects → New Project → GitHub → nallion/AudioPlayer),
# клонирование настраивать здесь НЕ нужно — AppVeyor сам клонирует
# репозиторий, привязанный к проекту, при каждом пуше/PR по вебхуку.
clone_depth: 5

# UWP собирается только на Windows-образах с установленным Windows 10 SDK.
image: Visual Studio 2017

platform:
  - ARM

configuration:
  - Release

before_build:
  # PackageReference вместо packages.config — обычный nuget restore прекрасно
  # с этим справляется сам, без -PackagesDirectory и без ручных проверок
  # facade-папок: NuGet сам генерирует obj\*.csproj.nuget.g.targets/.props
  # с правильными, корректно разделёнными compile-time/runtime зависимостями.
  - cmd: nuget restore AudioVisualizerPlayer.sln

build:
  project: AudioVisualizerPlayer.sln
  verbosity: minimal

build_script:
  - cmd: >-
      msbuild AudioVisualizerPlayer.sln
      /p:Configuration=%CONFIGURATION%
      /p:Platform=%PLATFORM%
      /verbosity:minimal

# Автоподпись пакета тестовым сертификатом (CN=DevCert, совпадает с Publisher
# в Package.appxmanifest) теперь делает сам .csproj — таргет AutoSignAppx.
# Никакого ручного unpack/pack .appx и вычищения facade-сборок больше не
# нужно: PackageReference с самого начала не тянет их в пакет.
artifacts:
  - path: '**\*.appx'
    name: appx
  - path: '**\*.appxbundle'
    name: appxbundle
  - path: '**\*.appxupload'
    name: appxupload

# ARM-сборка не запускается на CI-раннере, только компилируется —
# юнит-тестов в проекте пока нет, поэтому тестовый шаг не настроен.
test: off

# Кэшируем NuGet-пакеты между сборками
cache:
  - packages -> AudioVisualizerPlayer.csproj
